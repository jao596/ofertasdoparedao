<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo de Desafios</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #120b16, #1d1024);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .user {
  color: #ff0000;
  font-weight: bold;
}

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .hidden {
      display: none !important;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .sub {
      color: rgba(255,255,255,0.72);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: 1fr 1fr;
    }

    input, select, button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
    }

    input, select {
      background: #10131a;
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      outline: none;
    }

    button {
      background: #ff3f85;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .secondary {
      background: rgba(255,255,255,0.08);
    }

    .desafio-box {
      margin: 20px 0;
      padding: 28px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,63,133,0.18), rgba(255,63,133,0.08));
      border: 1px solid rgba(255,63,133,0.2);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .vez {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ff9abc;
      margin-bottom: 10px;
      text-align: center;
    }

    .desafio {
      font-size: 30px;
      line-height: 1.4;
      font-weight: bold;
      text-align: center;
    }

    .historico-item {
      background: #0f1218;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .historico-item small {
      display: block;
      color: #ff9abc;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 11px;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-box {
      width: 100%;
      max-width: 650px;
      background: linear-gradient(180deg, #24112c, #1a0f22);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      animation: aparecer 0.2s ease;
    }

    .modal-topo {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ff9abc;
      margin-bottom: 12px;
      text-align: center;
    }

    .modal-texto {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .modal-botoes {
      display: grid;
      gap: 12px;
    }

    .btn-proxima {
      background: linear-gradient(180deg, #ff5c98, #ff3f85);
    }

    .btn-fechar {
      background: rgba(255,255,255,0.08);
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .desafio {
        font-size: 24px;
      }

      .modal-texto {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- INÍCIO -->
    <div id="telaInicio" class="card">
      <h1>Jogo de Desafios</h1>
      <p class="sub">Digite o nome dos participantes para começar.</p>

      <div class="grid grid-2">
        <div>
          <p>Participante 1</p>
          <input type="text" id="nome1" placeholder="Digite o nome do participante 1">
        </div>

        <div>
          <p>Participante 2</p>
          <input type="text" id="nome2" placeholder="Digite o nome do participante 2">
        </div>
      </div>

      <div style="margin-top: 16px;">
        <p>Nível inicial</p>
        <select id="nivelInicio">
          <option value="leve">Leve</option>
          <option value="medio">Médio</option>
          <option value="quente">Quente</option>
        </select>
      </div>

      <div style="margin-top: 18px;">
        <button onclick="iniciarJogo()">Começar jogo</button>
      </div>
    </div>

    <!-- JOGO -->
    <div id="telaJogo" class="hidden" style="margin-top: 20px;">
      <div class="grid grid-2">
        <div class="card">
          <h3>Participantes</h3>
          <h2 id="tituloParticipantes">Jogador 1 × Jogador 2</h2>
        </div>

        <div class="card">
          <h3>Nível atual</h3>
          <select id="nivelJogo" onchange="trocarNivel()">
            <option value="leve">Leve</option>
            <option value="medio">Médio</option>
            <option value="quente">Quente</option>
          </select>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <div class="desafio-box">
          <div class="vez" id="vezTexto">Vez de Jogador 1</div>
          <div class="desafio" id="desafioTexto">Clique em “Sortear desafio” para começar.</div>
        </div>

        <div class="grid grid-2">
          <button onclick="abrirDesafio()">Ir para outra rodada</button>
          <button class="secondary" onclick="reiniciarJogo()">Trocar nomes</button>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h3>Histórico</h3>
        <div id="historicoLista">
          <div class="historico-item">Nenhum desafio sorteado ainda.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modalDesafio" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-topo" id="modalVezTexto">Nova rodada</div>
      <div class="modal-texto" id="modalDesafioTexto"></div>

      <div class="modal-botoes">
        <button class="btn-proxima" onclick="confirmarRodada()">Continuar</button>
        <button class="btn-fechar" onclick="fecharModal()">Fechar</button>
      </div>
    </div>
  </div>

  <script>
    const desafios = {
      leve: [
        "[User1], olhe nos olhos de [User2] por 10 segundos sem rir.",
        "[User1], faça um elogio sincero para [User2].",
        "[User1], segure a mão de [User2] até a próxima rodada.",
        "[User1], descreva em uma frase o que mais chama sua atenção em [User2].",
        "[User1], escolha uma música que combine com [User2].",
        "[User1], encoste a testa na de [User2] por 5 segundos."
      ],
      medio: [
        "[User1], sussurre algo fofo no ouvido de [User2].",
        "[User1], abrace [User2] por 10 segundos.",
        "[User1], faça [User2] sorrir em até 5 segundos.",
        "[User1], descreva como seria um encontro ideal com [User2].",
        "[User1], chegue perto de [User2] e mantenha o olhar por 8 segundos.",
        "[User1], dê um beijo no rosto de [User2]."
      ],
      quente: [
        "[User1], Lentamente tire a camiseta de [User2], com intenção! [User2], fique quieto(a) e apenas obedeça.",
        "[User1], Encoste a boca em [User2] e fale lentamente três frases que deixariam ele(a) maluco (a).  [User2], tem algo que foi dito que você gostaria de fazer?",
        "[User1], Diga a [User2] como gostaria que ele(a) estivesse vestido(a) agora. Descreva com detalhes",
        "[User1], Tire sua roupa intima e comece a se mastubar ate a proxima rodada. [User2], tente se concentrar na proxima pergunta, se conseguir… rs",
        "[User1], tire uma selfie beijando a parte do corpo de [User2] que você preferir ",
        "[User2], dê um beijo apaixonado em [User1] por 10 segundos"
      ]
    };

    let participante1 = "Jogador 1";
    let participante2 = "Jogador 2";
    let nivelAtual = "leve";
    let jogadorAtual = 1;
    let historico = [];
    let desafioPendente = "";

    function iniciarJogo() {
      participante1 = document.getElementById("nome1").value.trim() || "Jogador 1";
      participante2 = document.getElementById("nome2").value.trim() || "Jogador 2";
      nivelAtual = document.getElementById("nivelInicio").value;
      jogadorAtual = 1;
      historico = [];
      desafioPendente = "";

      document.getElementById("tituloParticipantes").textContent = `${participante1} × ${participante2}`;
      document.getElementById("nivelJogo").value = nivelAtual;
      document.getElementById("vezTexto").textContent = `Vez de ${participante1}`;
      document.getElementById("desafioTexto").textContent = 'Clique em “Ir para outra rodada” para começar.';
      renderHistorico();

      document.getElementById("telaInicio").classList.add("hidden");
      document.getElementById("telaJogo").classList.remove("hidden");
    }

    function trocarNivel() {
      nivelAtual = document.getElementById("nivelJogo").value;
    }

    function montarDesafio(template) {
      const user1 = jogadorAtual === 1 ? participante1 : participante2;
      const user2 = jogadorAtual === 1 ? participante2 : participante1;

      return template
        .replaceAll("[User1]", user1)
        .replaceAll("[User2]", user2);
    }

    function abrirDesafio() {
      const lista = desafios[nivelAtual];
      let template = lista[Math.floor(Math.random() * lista.length)];
      let final = montarDesafio(template);

      if (lista.length > 1 && historico.length > 0) {
        while (final === historico[0]) {
          template = lista[Math.floor(Math.random() * lista.length)];
          final = montarDesafio(template);
        }
      }

      desafioPendente = final;

      const jogadorNome = jogadorAtual === 1 ? participante1 : participante2;
      document.getElementById("modalVezTexto").textContent = `Vez de ${jogadorNome}`;
      document.getElementById("modalDesafioTexto").textContent = final;
      document.getElementById("modalDesafio").classList.remove("hidden");
    }

    function confirmarRodada() {
      if (!desafioPendente) return;

      document.getElementById("desafioTexto").textContent = desafioPendente;

      historico.unshift(desafioPendente);
      historico = historico.slice(0, 10);
      renderHistorico();

      jogadorAtual = jogadorAtual === 1 ? 2 : 1;
      const proximo = jogadorAtual === 1 ? participante1 : participante2;
      document.getElementById("vezTexto").textContent = `Vez de ${proximo}`;

      fecharModal();
      desafioPendente = "";
    }

    function fecharModal() {
      document.getElementById("modalDesafio").classList.add("hidden");
    }

    function renderHistorico() {
      const box = document.getElementById("historicoLista");

      if (historico.length === 0) {
        box.innerHTML = '<div class="historico-item">Nenhum desafio sorteado ainda.</div>';
        return;
      }

      box.innerHTML = historico.map((item, index) => `
        <div class="historico-item">
          <small>Rodada ${historico.length - index}</small>
          <div>${item}</div>
        </div>
      `).join("");
    }

    function reiniciarJogo() {
      document.getElementById("telaJogo").classList.add("hidden");
      document.getElementById("telaInicio").classList.remove("hidden");
      fecharModal();
    }
  </script>
</body>
</html>
