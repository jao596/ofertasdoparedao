  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(180deg,#0f0f0f,#1b1b1b);
      font-family:Arial, Helvetica, sans-serif;
      color:#fff;
    }

    .container{
      text-align:center;
      max-width:420px;
      width:100%;
      padding:20px;
    }

    .logo{
      width:140px;
      height:140px;
      border-radius:50%;
      background:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      margin:0 auto 20px;
    }

    .logo img{
      width:90%;
      height:90%;
      border-radius:50%;
    }

    h1{
      font-size:26px;
      margin-bottom:8px;
    }

    .subtitle{
      font-size:16px;
      opacity:0.9;
      margin-bottom:15px;
    }

    .box{
      background:rgba(255,255,255,0.08);
      padding:15px;
      border-radius:12px;
      font-size:14px;
      margin-bottom:22px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:#25D366;
      color:#000;
      text-decoration:none;
      padding:18px;
      border-radius:35px;
      font-weight:bold;
      font-size:16px;
      transition:0.2s;
      box-shadow:0 6px 15px rgba(0,0,0,0.3);
    }

    .btn:hover{
      transform:scale(1.04);
    }

    .btn img{
      width:24px;
      height:24px;
    }

    .footer{
      font-size:12px;
      opacity:0.85;
      margin-top:20px;
