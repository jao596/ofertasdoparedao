<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promotech Ofertas</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b8cff;
  font-family:Arial, Helvetica, sans-serif;
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;
  padding:40px 20px;
  text-align:center;
}

/* LOGO */
.logo{
  width:150px;
  height:150px;
  border-radius:50%;
  margin-bottom:20px;
  object-fit:cover;
  transition: transform 0.3s;
}

.logo:hover{
  transform: scale(1.05);
}

/* título */
h1{
  font-size:2rem;
  margin:0 0 10px;
  font-weight:700;
}

/* subtítulo */
.subtitle{
  font-size:.95rem;
  opacity:.9;
  margin-bottom:30px;
}

/* botões */
.link{
  display:flex;
  align-items:center;
  gap:14px;
  background:#fff;
  color:#000;
  text-decoration:none;
  font-weight:600;
  border-radius:999px;
  padding:14px 18px;
  margin-bottom:16px;
  transition:.2s;
}

.link:hover{
  transform:scale(1.04);
}

/* ícones */
.icon{
  width:36px;
  height:36px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.whatsapp-icon{
  background:#25d366;
}

.telegram-icon{
  background:#000;
}

.icon svg{
  width:20px;
  height:20px;
  fill:#fff;
}

.text{
  flex:1;
  text-align:left;
  font-size:.95rem;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <a href="https://www.promotech.com" target="_blank">
    <img src="https://i.postimg.cc/Ty7Yxn68/logo.png" alt="Logo Promotech" class="logo">

  <!-- NOME -->

  <div class="subtitle">Promoções reais que somem rápido 🔥</div>

</html>
